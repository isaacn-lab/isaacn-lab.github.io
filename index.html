<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="referrer" content="no-referrer">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>Yandex Disk Album Viewer</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23111'/><rect x='4' y='9' width='24' height='16' rx='3' fill='none' stroke='%23fc3f1d' stroke-width='2'/><circle cx='16' cy='17' r='4.5' fill='none' stroke='%23fc3f1d' stroke-width='2'/><rect x='11' y='6' width='6' height='4' rx='1.5' fill='%23fc3f1d'/></svg>">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3/dist/plyr.css">
  <script src="https://cdn.jsdelivr.net/npm/plyr@3/dist/plyr.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111; color: #fff; font-family: Arial, sans-serif; height: 100dvh; overflow: hidden; }

    /* ── Input screen ── */
    #input-screen {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 100dvh; gap: 16px; padding: 24px;
    }
    #input-screen h2 { font-size: 22px; font-weight: normal; text-align: center; }
    #input-screen p  { color: #888; text-align: center; line-height: 1.7; font-size: 14px; }
    #input-screen code { color: #fc3f1d; }
    #album-input {
      width: 100%; max-width: 520px; padding: 13px 16px; font-size: 16px;
      border-radius: 10px; border: 1px solid #444; background: #222; color: #fff;
      outline: none; -webkit-appearance: none; appearance: none;
    }
    #album-input:focus { border-color: #fc3f1d; }
    #load-btn {
      padding: 13px 40px; font-size: 16px; background: #fc3f1d; color: #fff;
      border: none; border-radius: 10px; cursor: pointer; touch-action: manipulation;
    }
    #load-btn:active { background: #c93218; }
    #input-status { color: #aaa; font-size: 14px; min-height: 20px; text-align: center; }

    /* ── Album list screen ── */
    #album-list-screen {
      display: flex; flex-direction: column; height: 100dvh;
    }
    #album-list-header {
      flex-shrink: 0; padding: 16px 20px;
      font-size: 20px; font-weight: bold; color: #fff;
      background: #1a1a1a; border-bottom: 1px solid #2a2a2a;
    }
    #album-list-body {
      flex: 1; overflow-y: auto; padding: 16px;
      -webkit-overflow-scrolling: touch;
    }
    #album-list-body::-webkit-scrollbar { width: 4px; }
    #album-list-body::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }
    .album-section-heading {
      font-size: 16px; font-weight: bold; color: #aaa;
      padding: 8px 4px 10px; margin-top: 8px;
    }
    .album-section-heading:first-child { margin-top: 0; }
    .album-section-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px; margin-bottom: 24px;
    }
    @media (max-width: 480px) {
      .album-section-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
      #album-list-body { padding: 10px; }
    }
    .album-card {
      cursor: pointer; border-radius: 8px;
      background: #1a1a1a; touch-action: manipulation; transition: opacity .15s;
    }
    .album-card:hover, .album-card:active { opacity: .8; }
    .album-card-img {
      position: relative; width: 100%; height: 0; padding-bottom: 100%;
      background: #222; overflow: hidden;
      border-radius: 8px 8px 0 0;
    }
    .album-card-img img {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .album-card.loading .album-card-img::after {
      content: ''; position: absolute; inset: 0; margin: auto;
      width: 28px; height: 28px;
      border: 2px solid rgba(255,255,255,.15); border-top-color: #fc3f1d;
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    .album-card-name {
      height: 34px; line-height: 34px;
      padding: 0 10px; font-size: 13px; color: #ccc;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    /* ── Gallery screen ── */
    #gallery {
      display: none; position: fixed; inset: 0;
      flex-direction: column; background: #111;
    }
    #gallery.active { display: flex; }

    #gallery-topbar {
      flex-shrink: 0; display: flex; align-items: center; gap: 8px;
      padding: 12px 16px; background: #1a1a1a; border-bottom: 1px solid #2a2a2a;
    }
    #gallery-title { font-size: 15px; color: #ddd; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #gallery-count { font-size: 13px; color: #777; flex-shrink: 0; }
    #gallery-close-btn {
      background: none; border: none; color: #bbb; cursor: pointer;
      padding: 6px 8px; border-radius: 6px; line-height: 1; flex-shrink: 0;
      touch-action: manipulation; font-size: 20px;
    }
    #gallery-close-btn:hover, #gallery-close-btn:active { color: #fff; background: rgba(255,255,255,.15); }

    #gallery-grid {
      flex: 1; min-height: 0; overflow-y: auto; padding: 4px;
      display: grid; align-content: start;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 4px;
      -webkit-overflow-scrolling: touch;
    }
    #gallery-grid::-webkit-scrollbar { width: 4px; }
    #gallery-grid::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }

    .gallery-tile {
      position: relative; width: 100%; height: 0; padding-bottom: 100%;
      cursor: pointer; background: #1a1a1a; overflow: hidden; border-radius: 3px;
      touch-action: manipulation;
    }
    .gallery-tile img {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; display: block; transition: opacity .15s;
    }
    .gallery-tile:hover img, .gallery-tile:active img { opacity: .8; }

    /* tile loading spinner */
    .gallery-tile::before {
      content: ''; position: absolute; inset: 0; margin: auto;
      width: 24px; height: 24px;
      border: 2px solid rgba(255,255,255,.15); border-top-color: #fc3f1d;
      border-radius: 50%; animation: spin .7s linear infinite;
      pointer-events: none;
    }
    .gallery-tile.loaded::before { display: none; }
    .gallery-tile-play {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(0,0,0,.6);
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    .gallery-tile-play::after {
      content: '▶'; font-size: 14px; color: #fff; margin-left: 3px;
    }

    @media (max-width: 480px) {
      #gallery-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
    }

    /* ── Viewer ── */
    #viewer {
      display: none; position: fixed; inset: 0;
      background: #000; flex-direction: column;
    }
    #viewer.active { display: flex; }

    /* top trigger + top bar */
    #top-trigger {
      position: absolute; top: 0; left: 0; right: 0; height: 40px; z-index: 19;
    }
    #topbar {
      position: absolute; top: 0; left: 0; right: 0; z-index: 20;
      display: flex; align-items: center; gap: 8px;
      padding: 12px 16px;
      background: linear-gradient(to bottom, rgba(0,0,0,.8) 0%, transparent 100%);
      transform: translateY(-100%); transition: transform .25s ease;
    }
    #viewer.thumbs-open #topbar { transform: translateY(0); }
    #top-trigger:hover ~ #topbar,
    #topbar:hover { transform: translateY(0); }
    #photo-counter { font-size: 13px; color: #bbb; white-space: nowrap; flex-shrink: 0; }
    #photo-name    { font-size: 13px; color: #bbb; flex: 1; text-align: center;
                     overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .topbar-btn {
      background: none; border: none; color: #bbb; cursor: pointer;
      padding: 6px 8px; border-radius: 6px; line-height: 1; flex-shrink: 0;
      touch-action: manipulation; font-size: 18px;
    }
    .topbar-btn:hover, .topbar-btn:active { color: #fff; background: rgba(255,255,255,.15); }
    #thumbs-btn.on    { color: #fc3f1d; }
    #hires-btn.on     { color: #fc3f1d; }
    #fullscreen-btn.on { color: #fc3f1d; }
    #quality-select {
      display: none; background: rgba(255,255,255,.08); border: 1px solid #555;
      color: #bbb; border-radius: 6px; padding: 4px 6px; font-size: 13px;
      cursor: pointer; -webkit-appearance: none; appearance: none; flex-shrink: 0;
    }
    #quality-select:hover { background: rgba(255,255,255,.18); }
    #close-btn { font-size: 20px; }

    /* main photo area */
    #photo-area {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      padding-top: 0;
      padding-bottom: 0;
      transition: padding-top .25s ease, padding-bottom .25s ease;
    }
    #viewer.thumbs-open #photo-area { padding-top: 52px; padding-bottom: 116px; }

    #main-photo {
      max-width: 100%; max-height: 100%; object-fit: contain;
      user-select: none; -webkit-user-drag: none;
      transition: filter .3s ease, transform .3s ease;
    }
    #main-photo.preview {
      filter: none;
      transform: none;
    }

    #video-wrapper {
      display: none; width: 100%; height: 100%;
    }
    #video-wrapper .plyr {
      width: 100%; height: 100%;
    }
    #video-wrapper .plyr video {
      object-fit: contain;
    }
    #main-video { width: 100%; height: 100%; }

    /* spinner */
    #spinner {
      display: none; position: absolute; z-index: 5;
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,.15); border-top-color: #fc3f1d;
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* nav arrows */
    .nav-arrow {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(0,0,0,.35); border: none; color: #fff;
      font-size: 32px; width: 48px; height: 72px;
      cursor: pointer; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s; z-index: 10;
      touch-action: manipulation;
    }
    .nav-arrow:hover  { background: rgba(255,255,255,.18); }
    .nav-arrow:active { background: rgba(255,255,255,.28); }
    .nav-arrow:disabled { opacity: .12; pointer-events: none; }
    #prev-btn { left: 8px; }
    #next-btn { right: 8px; }

    /* error */
    #error-overlay {
      display: none; position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%); color: #f66; font-size: 14px;
      background: rgba(0,0,0,.7); padding: 10px 20px; border-radius: 8px;
    }

    /* thumbnail strip */
    #thumb-strip {
      position: absolute; bottom: 0; left: 0; right: 0; height: 116px;
      background: linear-gradient(to top, rgba(0,0,0,.9) 60%, transparent 100%);
      display: flex; align-items: center;
      padding: 10px 8px 10px;
      gap: 6px; overflow-x: auto; scroll-behavior: smooth;
      transform: translateY(100%); transition: transform .25s ease;
      -webkit-overflow-scrolling: touch;
    }
    /* Pinned mode: pushes photo area up */
    #viewer.thumbs-open #thumb-strip { transform: translateY(0); }
    #viewer.thumbs-open #photo-area  { padding-bottom: 116px; }

    /* Hover mode: overlay only, no padding change — disabled when viewing video */
    #viewer:not(.viewing-video) #thumb-trigger:hover ~ #thumb-strip,
    #viewer:not(.viewing-video) #thumb-strip:hover { transform: translateY(0); }

    #thumb-trigger {
      position: absolute; bottom: 0; left: 0; right: 0; height: 40px; z-index: 9;
    }
    #viewer.viewing-video #thumb-trigger { pointer-events: none; }
    #thumb-strip::-webkit-scrollbar { height: 3px; }
    #thumb-strip::-webkit-scrollbar-thumb { background: #555; border-radius: 2px; }

    .thumb {
      position: relative;
      width: 78px; height: 78px; flex-shrink: 0; cursor: pointer;
      border: 2px solid transparent; border-radius: 5px; overflow: hidden;
      opacity: .5; transition: opacity .15s, border-color .15s;
      background: #1a1a1a; touch-action: manipulation;
    }
    .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .thumb.active { border-color: #fc3f1d; opacity: 1; }
    .thumb:not(.active):hover, .thumb:not(.active):active { opacity: .8; }

    .thumb-play {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 26px; height: 26px; border-radius: 50%;
      background: rgba(0,0,0,.6);
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    .thumb-play::after {
      content: '▶'; font-size: 11px; color: #fff; margin-left: 2px;
    }

    /* mobile: smaller arrows, hide on very narrow screens */
    @media (max-width: 480px) {
      .nav-arrow { width: 36px; height: 56px; font-size: 24px; background: rgba(0,0,0,.25); }
      #prev-btn { left: 4px; }
      #next-btn { right: 4px; }
      #photo-name { display: none; }   /* too cramped on small phones */
    }
  </style>
</head>
<body>

<!-- ── Input screen ── -->
<div id="input-screen">
  <h2>Yandex Disk Album Viewer</h2>
  <p>Paste an album or item link:</p>
  <input id="album-input" type="text"
    placeholder="https://disk.yandex.com/d/KEY/…"
    autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
  <button id="load-btn">Open Album</button>
  <div id="input-status"></div>
</div>

<!-- ── Album list screen ── -->
<div id="album-list-screen" style="display:none">
  <div id="album-list-header">Isaac N. Media</div>
  <div id="album-list-body"></div>
</div>

<!-- ── Gallery preview screen ── -->
<div id="gallery">
  <div id="gallery-topbar">
    <span id="gallery-title">Album</span>
    <span id="gallery-count"></span>
    <button id="gallery-close-btn" title="Close">&#x2715;</button>
  </div>
  <div id="gallery-grid"></div>
</div>

<!-- ── Full-screen viewer ── -->
<div id="viewer">
  <div id="top-trigger"></div>
  <div id="topbar">
    <span id="photo-counter"></span>
    <span id="photo-name"></span>
    <button class="topbar-btn" id="fullscreen-btn" title="Toggle fullscreen">&#x26F6;</button>
    <button class="topbar-btn" id="hires-btn" title="Toggle hi-res">&#10022;</button>
<button class="topbar-btn" id="thumbs-btn" title="Toggle thumbnails">&#9783;</button>
    <button class="topbar-btn" id="close-btn" title="Close (Esc)">&#x2715;</button>
  </div>

  <div id="photo-area">
    <div id="spinner"></div>
    <img id="main-photo" src="" alt="">
    <div id="video-wrapper">
      <video id="main-video" playsinline></video>
    </div>
    <div id="error-overlay">Failed to load</div>
    <button class="nav-arrow" id="prev-btn">&#8249;</button>
    <button class="nav-arrow" id="next-btn">&#8250;</button>
  </div>

  <div id="thumb-trigger"></div>
  <div id="thumb-strip"></div>
</div>

<script>
  // ── Album list ─────────────────────────────────────────────────────────────
  const ALBUM_KEYS = [
    'T8EnVn82w8ObWA',
    'FbANj95MIoSV_Q',
    'qQfvVlYD71h_8g',
    'Qg5hmzODRL5b1g',
    '4QzVU38QyChzkQ',
    'N-pqKmz3XHKg-w',
    'iGAJFlh2xAmFRg',
    '163nhQ0GVjCavQ',
    'CwdkHjvmjhZnQA',
    'ymZXQCcAD5H-vg',
    'yPgBxw1C6eHDFw',
    'lROqbwGTFsfOdA',
    'c_7ic8YavaxWQw',
    'QJSAWLzkPL3g2A',
    'elRbJ1jXUoyyoA',
    'df4gDI8gHzqj8A',
    'Ha41Abu1AD1GCA',
    'PotcQzcNGNmQiQ',
    'Q6-9YON76b25FQ',
    'Jdp4_i8_5dYVBw',
    '698vu7-A4_B1wQ',
    'QE_9k1vkL57epQ',
    'Qunuc2uiQTE__g',
    'j5YlIcpTXvlCxQ',
    'PSBQHc22PZcjFA',
    '46Tz82wPGrDiLw',
    'HA8_i0dwLikLeg',
    'jZDaC7GzQ3ky3g',
    '_zaKyQC3rGeZEw',
    'K5mCEYB6Sqv-5g',
    'h-I3_37CViUyNg',
    'IkBGkQT4Z2xf9A',
    'B2RZ--qor3hj6A',
    'jhIu6a92G1VdnA',
    'kaav-h6E-WNw4w',
  ];

  // ── State ──────────────────────────────────────────────────────────────────
  let photos = [];   // [{name, path, preview, fullUrl}]
  let currentIndex = 0;
  let publicKey = '';
  let albumKey = '';
  let albumName = '';
  let loadGen = 0;   // incremented on every showPhoto call; stale loads self-cancel
  let fromGallery = false;  // whether the viewer was opened from the gallery
  let hiRes = !window.matchMedia('(hover: none)').matches;  // default: on for desktop, off for mobile
  let hlsInstance = null;
  let plyrInstance = null;

  // ── Elements ───────────────────────────────────────────────────────────────
  const inputScreen  = document.getElementById('input-screen');
  const albumInput   = document.getElementById('album-input');
  const loadBtn      = document.getElementById('load-btn');
  const inputStatus  = document.getElementById('input-status');
  const albumListScreen = document.getElementById('album-list-screen');
  const albumListBody   = document.getElementById('album-list-body');
  const gallery      = document.getElementById('gallery');
  const galleryGrid  = document.getElementById('gallery-grid');
  const galleryTitle = document.getElementById('gallery-title');
  const galleryCount = document.getElementById('gallery-count');
  const galleryCloseBtn = document.getElementById('gallery-close-btn');
  const viewer       = document.getElementById('viewer');
  const photoCounter = document.getElementById('photo-counter');
  const photoName    = document.getElementById('photo-name');
  const mainPhoto    = document.getElementById('main-photo');
const prevBtn      = document.getElementById('prev-btn');
  const nextBtn      = document.getElementById('next-btn');
  const thumbStrip   = document.getElementById('thumb-strip');
  const spinner      = document.getElementById('spinner');
  const closeBtn     = document.getElementById('close-btn');
  const thumbsBtn    = document.getElementById('thumbs-btn');
  const hiresBtn        = document.getElementById('hires-btn');
  const fullscreenBtn   = document.getElementById('fullscreen-btn');
  const errorOverlay    = document.getElementById('error-overlay');
  const videoWrapper    = document.getElementById('video-wrapper');

  // ── Input screen helpers ───────────────────────────────────────────────────
  function parseAndLoad(value, imageFile) {
    value = value.trim();
    const urlMatch = value.match(/disk\.yandex\.\w+\/d\/([^/?#]+)|yadi\.sk\/d\/([^/?#]+)/);
    if (urlMatch) {
      albumKey = urlMatch[1] || urlMatch[2];
      publicKey = `https://disk.yandex.com/d/${albumKey}`;
      if (!imageFile) {
        const remainder = value.slice(value.indexOf(albumKey) + albumKey.length);
        if (remainder.startsWith('/') && remainder.length > 1)
          imageFile = remainder.slice(1).split('?')[0].split('#')[0] || null;
      }
      loadAlbum(imageFile || null);
      return;
    }
    try {
      const url = new URL(value);
      const parts = url.pathname.split('/').filter(Boolean);
      if (parts.length >= 1) {
        albumKey = decodeURIComponent(parts[0]);
        publicKey = `https://disk.yandex.com/d/${albumKey}`;
        imageFile = imageFile || (parts.length > 1 ? decodeURIComponent(parts.slice(1).join('/')) : null);
        loadAlbum(imageFile || null);
        return;
      }
    } catch (_) {}
    albumKey = value;
    publicKey = `https://disk.yandex.com/d/${value}`;
    loadAlbum(imageFile || null);
  }

  function setInputStatus(msg) { inputStatus.textContent = msg; }

  function showInputScreen() {
    inputScreen.style.display = '';
    albumListScreen.style.display = 'none';
    gallery.classList.remove('active');
    viewer.classList.remove('active', 'thumbs-open');
    thumbsBtn.classList.remove('on');
    photos = []; publicKey = ''; albumKey = ''; albumName = ''; currentIndex = 0;
    galleryGrid.innerHTML = '';
    thumbStrip.innerHTML = '';
    document.title = 'Yandex Disk Album Viewer';
    history.replaceState(null, '', location.pathname);
  }

  loadBtn.onclick = () => parseAndLoad(albumInput.value);
  albumInput.addEventListener('keydown', e => { if (e.key === 'Enter') loadBtn.click(); });

  // ── Album list ─────────────────────────────────────────────────────────────
  let albumListBuilt = false;

  async function fetchAlbumMeta(key) {
    const pk = `https://disk.yandex.com/d/${key}`;
    const url = `https://cloud-api.yandex.net/v1/disk/public/resources`
      + `?public_key=${encodeURIComponent(pk)}`
      + `&limit=10&preview_size=480x480&preview_crop=true`
      + `&fields=name,_embedded.items.preview,_embedded.items.mime_type`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`API ${res.status}`);
    const data = await res.json();
    const items = data._embedded?.items || [];
    const preview = items.find(i => i.preview)?.preview || null;
    const rawName = data.name || key;
    const name = rawName.replace(/\[ISN\]/gi, '').replace(/\b(20\d{2}|19\d{2})\b/g, '').replace(/\s{2,}/g, ' ').trim();
    return { name, rawName, preview };
  }

  function extractYear(name) {
    const m = name.match(/\b(20\d{2}|19\d{2})\b/);
    return m ? m[1] : null;
  }

  function buildAlbumList() {
    if (albumListBuilt) return;
    albumListBuilt = true;

    // Create a placeholder card per key, grouped by year (unknown at build time)
    // We render placeholders into a flat map keyed by album key, then
    // once meta loads we place each card into the right section.
    const yearSections = new Map(); // year -> { heading, grid }
    let otherSection = null;

    function getOrCreateSection(year) {
      const key = year || '__other__';
      if (yearSections.has(key)) return yearSections.get(key);
      const heading = document.createElement('div');
      heading.className = 'album-section-heading';
      heading.textContent = year || 'Other';
      const grid = document.createElement('div');
      grid.className = 'album-section-grid';
      yearSections.set(key, { heading, grid });
      return { heading, grid };
    }

    function reorderSections() {
      albumListBody.innerHTML = '';
      // Sort year sections descending; 'Other' goes last
      const sorted = [...yearSections.entries()].sort(([a], [b]) => {
        if (a === '__other__') return 1;
        if (b === '__other__') return -1;
        return b - a;
      });
      for (const [, { heading, grid }] of sorted) {
        albumListBody.appendChild(heading);
        albumListBody.appendChild(grid);
      }
    }

    // Build placeholder cards — all in a temporary loading section
    const placeholderSection = getOrCreateSection('Loading\u2026');
    const cardRefs = ALBUM_KEYS.map((key, i) => {
      const card = document.createElement('div');
      card.className = 'album-card loading';
      card.dataset.order = i;
      const imgWrap = document.createElement('div');
      imgWrap.className = 'album-card-img';
      card.appendChild(imgWrap);
      const nameEl = document.createElement('div');
      nameEl.className = 'album-card-name';
      card.appendChild(nameEl);
      card.onclick = () => openAlbum(key);
      placeholderSection.grid.appendChild(card);
      return { card, imgWrap, nameEl };
    });
    reorderSections();

    function insertInOrder(grid, card) {
      const order = Number(card.dataset.order);
      const sibling = [...grid.children].find(c => Number(c.dataset.order) > order);
      grid.insertBefore(card, sibling || null);
    }

    ALBUM_KEYS.forEach(async (key, i) => {
      const { card, imgWrap, nameEl } = cardRefs[i];
      try {
        const meta = await fetchAlbumMeta(key);
        card.classList.remove('loading');
        if (meta.preview) {
          const img = document.createElement('img');
          img.src = meta.preview;
          img.alt = meta.name;
          imgWrap.appendChild(img);
        }
        nameEl.textContent = meta.name;
        const year = extractYear(meta.rawName);
        const section = getOrCreateSection(year);
        insertInOrder(section.grid, card);
      } catch (e) {
        card.classList.remove('loading');
        nameEl.textContent = key;
        const section = getOrCreateSection(null);
        insertInOrder(section.grid, card);
        console.error(`Failed to load album ${key}:`, e);
      }
      // Remove loading placeholder section once it's empty
      if (!placeholderSection.grid.children.length) {
        placeholderSection.heading.remove();
        placeholderSection.grid.remove();
        yearSections.delete('Loading\u2026');
      }
      reorderSections();
    });
  }

  function showAlbumList() {
    buildAlbumList();
    inputScreen.style.display = 'none';
    albumListScreen.style.display = '';
    gallery.classList.remove('active');
    viewer.classList.remove('active', 'thumbs-open');
    thumbsBtn.classList.remove('on');
    photos = []; publicKey = ''; albumKey = ''; albumName = ''; currentIndex = 0;
    galleryGrid.innerHTML = '';
    thumbStrip.innerHTML = '';
    document.title = 'Isaac N. Media';
    history.replaceState(null, '', '#isn-media-library');
  }

  async function openAlbum(key) {
    publicKey = `https://disk.yandex.com/d/${key}`;
    albumKey = key;
    albumListScreen.style.display = 'none';
    gallery.classList.add('active');
    galleryTitle.textContent = 'Loading\u2026';
    galleryCount.textContent = '';
    galleryGrid.innerHTML = '';
    await loadAlbum(null);
  }

  // ── On load: check URL hash ────────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', () => {
    const hash = location.hash.slice(1);
    if (hash === 'isn-media-library') {
      showAlbumList();
    } else if (hash) {
      const parts = hash.split('/').filter(Boolean);
      if (parts.length >= 1) {
        const key = decodeURIComponent(parts[0]);
        const itemParam = parts.length > 1 ? decodeURIComponent(parts.slice(1).join('/')) : null;
        inputScreen.style.display = 'none';
        albumListScreen.style.display = 'none';
        publicKey = `https://disk.yandex.com/d/${key}`;
        albumKey = key;
        if (itemParam) {
          openViewer();
          spinner.style.display = 'block';
        } else {
          gallery.classList.add('active');
          galleryTitle.textContent = 'Loading\u2026';
          galleryCount.textContent = '';
        }
        loadAlbum(itemParam);
      }
    }
  });

  // ── Video / HLS / Plyr helpers ─────────────────────────────────────────────
  // 0 = Original (direct download), -1 = Auto, positive = height in px

  function destroyVideo() {
    if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
    if (plyrInstance) { plyrInstance.destroy(); plyrInstance = null; }
    // Plyr removes the <video> element on destroy — recreate it
    const v = document.createElement('video');
    v.id = 'main-video';
    v.setAttribute('playsinline', '');
    videoWrapper.innerHTML = '';
    videoWrapper.appendChild(v);
  }

  // levels: sorted array of heights from HLS manifest, or null for original-only
  function initPlyr(levels) {
    const video = document.getElementById('main-video');
    plyrInstance = new Plyr(video, {
      controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'settings', 'fullscreen'],
      settings: ['quality'],
      quality: {
        default: levels ? -1 : 0,
        options: levels ? (isMobile || isIOS ? [-1, ...levels] : [-1, ...levels, 0]) : [0],
        forced: true,
        onChange: onQualityChange,
      },
      i18n: { qualityLabel: { '-1': 'Auto', '0': 'Original' } },
      fullscreen: { iosNative: isIOS },
    });
    // Plyr may strip playsinline on iOS with iosNative — re-apply it
    if (isIOS && plyrInstance.media) {
      plyrInstance.media.setAttribute('playsinline', '');
      plyrInstance.media.setAttribute('webkit-playsinline', '');
    }
  }

  async function onQualityChange(quality) {
    quality = Number(quality);
    const photo = photos[currentIndex];

    if (quality === 0) {
      // Switch to direct download — tear down HLS
      if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
      if (!photo.fullUrl) photo.fullUrl = await getDownloadUrl(photo.path);
      const video = document.getElementById('main-video');
      const currentTime = plyrInstance?.currentTime || 0;
      video.src = photo.fullUrl;
      video.currentTime = currentTime;
      plyrInstance?.play();
    } else {
      // Switching to HLS level — re-attach HLS if it was torn down (was on Original)
      if (!hlsInstance) {
        const streamUrl = await getVideoStreamUrl(photo);
        if (!streamUrl) return;
        const video = document.getElementById('main-video');
        const currentTime = plyrInstance?.currentTime || 0;
        const hls = new Hls();
        hlsInstance = hls;
        hls.loadSource(streamUrl);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          hls.currentLevel = quality === -1 ? -1
            : hls.levels.reduce((best, l, i) =>
                Math.abs(l.height - quality) < Math.abs(hls.levels[best].height - quality) ? i : best, 0);
          video.currentTime = currentTime;
          plyrInstance?.play();
        });
      } else if (quality === -1) {
        hlsInstance.currentLevel = -1;
      } else {
        hlsInstance.currentLevel = hlsInstance.levels.reduce((best, l, i) =>
          Math.abs(l.height - quality) < Math.abs(hlsInstance.levels[best].height - quality) ? i : best, 0);
      }
    }
  }

  async function prefetchVideo(photo) {
    await fetchAndCacheStreamMeta(photo);
  }

  async function getVideoStreamUrl(photo) {
    if (photo.streamUrl !== null) return photo.streamUrl || null;
    await fetchAndCacheStreamMeta(photo);
    return photo.streamUrl || null;
  }

  async function fetchAndCacheStreamMeta(photo) {
    try {
      const metaRes = await fetch(
        `https://cloud-api.yandex.net/v1/disk/public/resources`
        + `?public_key=${encodeURIComponent(publicKey)}`
        + `&path=${encodeURIComponent(photo.path)}`
        + `&fields=public_url`
      );
      if (!metaRes.ok) { photo.streamUrl = false; photo.hlsLevels = false; return; }
      const { public_url } = await metaRes.json();
      const itemHash = public_url?.match(/\/i\/([^/?#]+)/)?.[1];
      if (!itemHash) { photo.streamUrl = false; photo.hlsLevels = false; return; }

      const pageUrl = `https://disk.yandex.com/i/${itemHash}`;
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 5000);
      let html;
      try {
        const res = await fetch(`https://corsproxy.io/?${encodeURIComponent(pageUrl)}`, { signal: controller.signal });
        clearTimeout(timer);
        if (!res.ok) { photo.streamUrl = false; photo.hlsLevels = false; return; }
        html = await res.text();
      } catch {
        clearTimeout(timer);
        photo.streamUrl = false; photo.hlsLevels = false; return;
      }

      const keyIdx = html.indexOf('"videos":');
      if (keyIdx === -1) { photo.streamUrl = false; photo.hlsLevels = false; return; }
      const arrStart = html.indexOf('[', keyIdx);
      let depth = 0, arrEnd = -1;
      for (let i = arrStart; i < html.length; i++) {
        if (html[i] === '[') depth++;
        else if (html[i] === ']') { if (--depth === 0) { arrEnd = i; break; } }
      }
      if (arrEnd === -1) { photo.streamUrl = false; photo.hlsLevels = false; return; }

      const videos = JSON.parse(html.substring(arrStart, arrEnd + 1));
      const adaptive = videos.find(v => v.dimension === 'adaptive');
      photo.streamUrl = adaptive?.url || videos.find(v => v.url?.includes('.m3u8'))?.url || false;

      // Parse quality levels from the per-dimension entries
      const allowed = [1080, 720, 360];
      const levels = videos
        .map(v => parseInt(v.dimension))
        .filter(h => allowed.includes(h))
        .sort((a, b) => b - a);
      photo.hlsLevels = levels.length ? levels : false;
    } catch {
      photo.streamUrl = false; photo.hlsLevels = false;
    }
  }

  function setupHlsVideo(url, cachedLevels) {
    if (typeof Hls === 'undefined') return false;
    const video = document.getElementById('main-video');
    if (Hls.isSupported()) {
      const hls = new Hls();
      hlsInstance = hls;
      hls.loadSource(url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, (_, data) => {
        hls.currentLevel = -1;
        // Use cached levels if available, otherwise derive from manifest
        const allowed = [1080, 720, 360];
        const levels = cachedLevels || [...new Set(data.levels.map(l => l.height).filter(h => allowed.includes(h)))].sort((a, b) => b - a);
        initPlyr(levels);
        plyrInstance.quality = -1;
      });
      return true;
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = url;
      initPlyr(cachedLevels || false);
      return true;
    }
    return false;
  }

  // ── API ────────────────────────────────────────────────────────────────────
  async function fetchPage(offset) {
    const url = `https://cloud-api.yandex.net/v1/disk/public/resources`
      + `?public_key=${encodeURIComponent(publicKey)}`
      + `&limit=500&offset=${offset}`
      + `&preview_size=1280x1280&preview_crop=false`
      + `&fields=name,_embedded.items.name,_embedded.items.path,_embedded.items.type,`
      + `_embedded.items.mime_type,_embedded.items.preview,_embedded.total`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`API ${res.status}: ${await res.text()}`);
    return res.json();
  }

  async function fetchAllPhotos() {
    let all = [], offset = 0, albumName = null;
    while (true) {
      const data  = await fetchPage(offset);
      if (albumName === null) albumName = data.name || null;
      const embed = data._embedded;
      if (!embed) break;
      const imgs = embed.items.filter(i => i.type === 'file' && (i.mime_type?.startsWith('image/') || i.mime_type?.startsWith('video/')));
      all = all.concat(imgs);
      offset += embed.items.length;
      if (offset >= embed.total || embed.items.length === 0) break;
    }
    return { items: all, albumName };
  }

  async function getDownloadUrl(filePath) {
    const url = `https://cloud-api.yandex.net/v1/disk/public/resources/download`
      + `?public_key=${encodeURIComponent(publicKey)}`
      + `&path=${encodeURIComponent(filePath)}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`Download API ${res.status}`);
    return (await res.json()).href;
  }

  function goHome() {
    if (ALBUM_KEYS.includes(albumKey)) showAlbumList(); else showInputScreen();
  }

  // ── Load album ─────────────────────────────────────────────────────────────
  async function loadAlbum(openFile) {
    const fromMediaLibrary = ALBUM_KEYS.includes(albumKey);
    if (!fromMediaLibrary) setInputStatus('Loading album\u2026');
    try {
      const { items, albumName: fetchedAlbumName } = await fetchAllPhotos();
      if (!items.length) {
        if (!fromMediaLibrary) setInputStatus('No photos found in this album.');
        else goHome();
        return;
      }

      if (fetchedAlbumName) { albumName = fetchedAlbumName; document.title = fetchedAlbumName; }

      photos = items.map(item => ({
        name:      item.name,
        path:      item.path,
        preview:   item.preview || null,
        fullUrl:   null,
        streamUrl: null,   // adaptive m3u8; null = pending, false = unavailable
        hlsLevels: null,   // sorted height[] from manifest; null = pending, false = unavailable
        mediaType: item.mime_type?.startsWith('video/') ? 'video' : 'image',
      }));

      if (!fromMediaLibrary) setInputStatus('');

      // Prefetch stream URL + HLS manifest levels for all videos in background
      photos.forEach(photo => { if (photo.mediaType === 'video') prefetchVideo(photo); });

      if (openFile) {
        // Direct link to a specific item — skip gallery, go straight to viewer
        const decoded = decodeURIComponent(openFile);
        const idx = photos.findIndex(p =>
          p.name === decoded || p.name === openFile ||
          p.path.endsWith('/' + decoded) || p.path.endsWith('/' + openFile)
        );
        fromGallery = true;
        openViewer();
        buildThumbs();
        await showPhoto(idx >= 0 ? idx : 0);
      } else {
        // No specific item — show gallery preview
        history.replaceState(null, '', '#' + albumKey);
        showGallery();
      }

    } catch (err) {
      if (!fromMediaLibrary) setInputStatus('Error: ' + err.message);
      else goHome();
      console.error(err);
    }
  }

  // ── Gallery ────────────────────────────────────────────────────────────────
  function showGallery() {
    viewer.classList.remove('active', 'thumbs-open');
    thumbsBtn.classList.remove('on');
    gallery.classList.add('active');

    galleryTitle.textContent = albumName || albumKey;
    galleryCount.textContent = `${photos.length} items`;

    galleryGrid.innerHTML = '';
    photos.forEach((photo, idx) => {
      const tile = document.createElement('div');
      tile.className = 'gallery-tile';
      if (photo.preview) {
        const img = document.createElement('img');
        img.alt = photo.name;
        img.loading = 'lazy';
        img.onload = () => tile.classList.add('loaded');
        img.src = photo.preview;
        tile.appendChild(img);
      } else {
        tile.classList.add('loaded');  // no preview = nothing to wait for
      }
      if (photo.mediaType === 'video') {
        const play = document.createElement('div');
        play.className = 'gallery-tile-play';
        tile.appendChild(play);
      }
      tile.onclick = () => openFromGallery(idx);
      galleryGrid.appendChild(tile);
    });
  }

  function openViewer() {
    viewer.classList.add('active');
    if (!isMobile) {
      viewer.classList.add('thumbs-open');
      thumbsBtn.classList.add('on');
    }
  }

  function openFromGallery(idx) {
    fromGallery = true;
    gallery.classList.remove('active');
    if (!thumbStrip.children.length) buildThumbs();
    openViewer();
    history.replaceState(null, '', '#' + albumKey + '/' + encodeURIComponent(photos[idx].name));
    showPhoto(idx, { scrollThumbs: false });
  }

  function hideGallery() {
    goHome();
  }

  galleryCloseBtn.onclick = hideGallery;

  // ── Viewer ─────────────────────────────────────────────────────────────────
  function hideViewer() {
    document.getElementById('main-video')?.pause(); destroyVideo(); videoWrapper.style.display = 'none';
    mainPhoto.src = '';
    viewer.classList.remove('active', 'thumbs-open');
    thumbsBtn.classList.remove('on');

    if (fromGallery) {
      fromGallery = false;
      history.replaceState(null, '', '#' + albumKey);
      showGallery();
    } else {
      goHome();
    }
  }

  function buildThumbs() {
    thumbStrip.innerHTML = '';
    photos.forEach((photo, idx) => {
      const div = document.createElement('div');
      div.className = 'thumb';
      if (photo.preview) {
        const img = document.createElement('img');
        img.src = photo.preview;
        img.alt = photo.name;
        div.appendChild(img);
      }
      if (photo.mediaType === 'video') {
        const play = document.createElement('div');
        play.className = 'thumb-play';
        div.appendChild(play);
      }
      div.onclick = () => showPhoto(idx, { scrollThumbs: false });
      thumbStrip.appendChild(div);
    });
  }

  async function showPhoto(idx, { scrollThumbs = true } = {}) {
    if (idx < 0 || idx >= photos.length) return;
    const gen = ++loadGen;   // this call "owns" the viewer until a newer call arrives
    currentIndex = idx;
    updateUrl();

    // UI state
    photoCounter.textContent = `${idx + 1}\u2009/\u2009${photos.length}`;
    photoName.textContent    = photos[idx].name;
    prevBtn.disabled = (idx === 0);
    nextBtn.disabled = (idx === photos.length - 1);

    // Highlight active thumb & optionally scroll into view
    Array.from(thumbStrip.children).forEach((el, i) => el.classList.toggle('active', i === idx));
    if (scrollThumbs) {
      thumbStrip.children[idx]?.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    }

    errorOverlay.style.display = 'none';

    const isVideo = photos[idx].mediaType === 'video';
    viewer.classList.toggle('viewing-video', isVideo);
    mainPhoto.style.display = isVideo ? 'none' : '';
    videoWrapper.style.display = isVideo ? 'block' : 'none';
    if (!isVideo) { document.getElementById('main-video')?.pause(); destroyVideo(); }

    if (!photos[idx]._prefetchReady) spinner.style.display = 'block';

    if (isVideo) {
      destroyVideo();
      try {
        // Try HLS streaming first (quality selection), fall back to direct download
        const streamUrl = await getVideoStreamUrl(photos[idx]);
        if (gen !== loadGen) return;

        if (streamUrl && setupHlsVideo(streamUrl, photos[idx].hlsLevels || null)) {
          // hls.js — Plyr + quality selector populated in MANIFEST_PARSED
        } else {
          if (!photos[idx].fullUrl) {
            photos[idx].fullUrl = await getDownloadUrl(photos[idx].path);
          }
          if (gen !== loadGen) return;
          document.getElementById('main-video').src = photos[idx].fullUrl;
          initPlyr(false);
        }
      } catch (e) {
        console.error('Failed to load video:', e);
        if (gen === loadGen) errorOverlay.style.display = 'block';
      } finally {
        if (gen === loadGen) spinner.style.display = 'none';
      }
    } else {
      // If hi-res is already prefetched, show it instantly without preview flash
      if (hiRes && photos[idx]._prefetchReady && photos[idx].fullUrl) {
        mainPhoto.src = photos[idx].fullUrl;
        mainPhoto.classList.remove('preview');
        spinner.style.display = 'none';
      } else {
        // Image: show preview immediately, then swap to full-res if enabled
        if (photos[idx].preview) {
          mainPhoto.src = photos[idx].preview;
          mainPhoto.classList.add('preview');
        } else {
          mainPhoto.classList.add('preview');
        }

        if (!hiRes) {
          // Stay on preview
          if (gen === loadGen) {
            mainPhoto.classList.remove('preview');
            spinner.style.display = 'none';
          }
        } else {
          try {
            if (!photos[idx].fullUrl) {
              photos[idx].fullUrl = await getDownloadUrl(photos[idx].path);
            }
            if (gen !== loadGen) return;

            const url = photos[idx].fullUrl;
            await new Promise((resolve, reject) => {
              const img = new Image();
              img.onload  = resolve;
              img.onerror = reject;
              img.src = url;
            });
            if (gen !== loadGen) return;

            mainPhoto.src = url;
          } catch (e) {
            console.error('Failed to load photo:', e);
            if (gen === loadGen) errorOverlay.style.display = 'block';
          } finally {
            if (gen === loadGen) {
              mainPhoto.classList.remove('preview');
              spinner.style.display = 'none';
            }
          }
        }
      }
    }

    // Prefetch adjacent photos in background (only when hi-res is on)
    if (hiRes) {
      prefetch(idx + 1);
      prefetch(idx + 2);
      prefetch(idx - 1);
    }
  }

  async function prefetch(idx) {
    if (idx < 0 || idx >= photos.length) return;
    const photo = photos[idx];
    if (photo.mediaType === 'video') return;
    if (!photo.fullUrl) {
      try { photo.fullUrl = await getDownloadUrl(photo.path); } catch (_) { return; }
    }
    if (!photo._prefetched) {
      photo._prefetched = true;
      const img = new Image();
      img.onload = () => { photo._prefetchReady = true; };
      img.src = photo.fullUrl;
    }
  }

  // ── Hi-res toggle ──────────────────────────────────────────────────────────
  hiresBtn.classList.toggle('on', hiRes);
  hiresBtn.onclick = () => {
    hiRes = !hiRes;
    hiresBtn.classList.toggle('on', hiRes);
    if (hiRes) showPhoto(currentIndex);  // reload current photo at full res
  };

  // ── Fullscreen toggle ──────────────────────────────────────────────────────
  const isMobile = window.matchMedia('(hover: none)').matches;
  const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
  const isStandalone = !!navigator.standalone;
  const fullscreenSupported = !!document.documentElement.requestFullscreen;
  if (isIOS || !fullscreenSupported) {
    fullscreenBtn.style.display = 'none';
  } else {
    if (isMobile) document.documentElement.requestFullscreen();

    function updateFullscreenBtn() {
      fullscreenBtn.classList.toggle('on', !!document.fullscreenElement);
    }
    document.addEventListener('fullscreenchange', updateFullscreenBtn);
    updateFullscreenBtn();

    fullscreenBtn.onclick = () => {
      if (document.fullscreenElement) document.exitFullscreen();
      else document.documentElement.requestFullscreen();
    };
  }

  // ── Navigation ─────────────────────────────────────────────────────────────
  prevBtn.onclick  = () => showPhoto(currentIndex - 1);
  nextBtn.onclick  = () => showPhoto(currentIndex + 1);
  closeBtn.onclick = hideViewer;

  thumbsBtn.onclick = () => {
    const open = viewer.classList.toggle('thumbs-open');
    thumbsBtn.classList.toggle('on', open);
    if (open) {
      setTimeout(() => {
        thumbStrip.children[currentIndex]?.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
      }, 260);
    }
  };

  // keyboard
  document.addEventListener('keydown', e => {
    if (viewer.classList.contains('active')) {
      const videoPlaying = plyrInstance && !plyrInstance.paused;
      if      (e.key === 'ArrowLeft')  { if (!videoPlaying) showPhoto(currentIndex - 1); }
      else if (e.key === 'ArrowRight') { if (!videoPlaying) showPhoto(currentIndex + 1); }
      else if (e.key === 'Escape')     hideViewer();
    } else if (gallery.classList.contains('active')) {
      if (e.key === 'Escape') hideGallery();
    }
  });

  // touch swipe (only on the main photo area, not the thumbnail strip)
  let touchStartX = 0;
  const photoArea = document.getElementById('photo-area');
  photoArea.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
  photoArea.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    const videoPlaying = plyrInstance && !plyrInstance.paused;
    if (Math.abs(dx) > 50 && !videoPlaying) showPhoto(currentIndex + (dx < 0 ? 1 : -1));
  }, { passive: true });

  // ── Helpers ────────────────────────────────────────────────────────────────
function updateUrl() {
    if (!albumKey || !photos.length) return;
    const name = encodeURIComponent(photos[currentIndex].name);
    history.replaceState(null, '', '#' + albumKey + '/' + name);
  }
</script>
</body>
</html>
